# Apache 2.4 vhost for supertonic-tts.zahiralam.com
#
# After placing this file at /etc/apache2/sites-available/supertonic-tts.conf:
#   a2enmod proxy proxy_http headers rewrite ssl
#   a2ensite supertonic-tts
#   apachectl configtest && systemctl reload apache2
#   certbot --apache -d supertonic-tts.zahiralam.com    # adds the :443 block

<VirtualHost *:80>
    ServerName supertonic-tts.zahiralam.com
    DocumentRoot /var/www/supertonic-tts/frontend/dist

    # Pre-cert: serve static so certbot can complete its HTTP-01 challenge.
    # Certbot rewrites this file to add the 301 → https redirect.

    <Directory /var/www/supertonic-tts/frontend/dist>
        Require all granted
        Options -Indexes +FollowSymLinks
        AllowOverride None

        # SPA fallback — any non-file path serves index.html
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteRule ^ /index.html [L]
    </Directory>

    # API reverse proxy → uvicorn on 127.0.0.1:8000
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 120

    <Location /api/>
        ProxyPass        http://127.0.0.1:8000/api/
        ProxyPassReverse http://127.0.0.1:8000/api/
        # Long synthesis requests
        RequestHeader set X-Forwarded-Proto "https" env=HTTPS
    </Location>

    # Cache static assets aggressively (Vite hashes filenames)
    <FilesMatch "\.(js|css|woff2?|svg|png|jpg|webp)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <FilesMatch "\.(html|json)$">
        Header set Cache-Control "no-cache"
    </FilesMatch>

    ErrorLog  ${APACHE_LOG_DIR}/supertonic-tts-error.log
    CustomLog ${APACHE_LOG_DIR}/supertonic-tts-access.log combined
</VirtualHost>
